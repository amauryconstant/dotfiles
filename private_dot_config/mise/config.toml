[settings]
experimental = true
idiomatic_version_file_enable_tools = ["python"]

[settings.python]
uv_venv_auto = true

[settings.npm]
bun = true

[tools]
# Runner & Package manager
uv = "latest"
bun = "latest"
node = [
    {version = "24"},
    {version="latest"}
]

# Development Tools
prettier = "latest"
"npm:playwright" = {version = "latest", postinstall = "playwright install"}

# AI Tools
"claude-code" = "latest"
"npm:opencode-ai" = "latest"
"npm:@fission-ai/openspec" = "latest"
"github:AlexsJones/llmfit" = "latest"
"github:arimxyer/models" = "latest"
"pipx:claude-monitor" = "latest"
"npm:ccusage"  = "latest"

# CLIs
"github:1jehuang/mermaid-rs-renderer" = "latest"
"pipx:posting" = "latest"
awscli = "latest"
"github:abhixdd/ghgrab" = "latest"


# Custom tools
"gitlab:amoconst/twiggit" = "latest"
