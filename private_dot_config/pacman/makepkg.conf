# ~/.config/pacman/makepkg.conf
# User makepkg overrides

# Use clean system PATH during builds to prevent mise shims from
# interfering with the build stage.
export PATH="/usr/local/sbin:/usr/local/bin:/usr/bin:/usr/sbin:/sbin:/bin"

# Disable separate *-debug split packages from AUR builds.
# /etc/makepkg.conf ships OPTIONS=(... debug ...); this file is sourced after it,
# and makepkg resolves OPTIONS last-match-wins, so appending !debug wins.
OPTIONS+=('!debug')
