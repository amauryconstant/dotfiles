# ============================================================================
# Voice STT - Speech-to-Text Dictation
# ============================================================================
# Push-to-talk: Hold key combo, speak, release to transcribe
# Text is copied to clipboard - paste with Ctrl+V
#
# SUPER+T       → Parakeet   (fast English, ONNX CUDA — daily use)
# SUPER+SHIFT+T → Moonshine  (alternate English, lower VRAM)
# SUPER+CTRL+T  → Whisper    (multilingual / non-English)
# ============================================================================

# Parakeet — primary engine (default in config)
bindd  = SUPER, T, Start voice dictation (Parakeet), exec, voxtype record start
binddr = SUPER, T, Stop voice dictation (Parakeet), exec, voxtype record stop

# Moonshine — secondary English engine
bindd  = SUPER SHIFT, T, Start voice dictation (Moonshine), exec, voxtype record start --engine moonshine
binddr = SUPER SHIFT, T, Stop voice dictation (Moonshine), exec, voxtype record stop

# Whisper large-v3-turbo — multilingual fallback
bindd  = SUPER CTRL, T, Start voice dictation (Whisper), exec, voxtype record start --engine whisper --model large-v3-turbo
binddr = SUPER CTRL, T, Stop voice dictation (Whisper), exec, voxtype record stop
