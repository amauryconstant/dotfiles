# ============================================================================
# Voice STT - Speech-to-Text Dictation (voxtype)
# ============================================================================
# Push-to-talk: Hold key combo, speak, release to transcribe (text → clipboard)
# Streaming:    Tap to start, tap to stop; text appears live as you speak
#
# SUPER+T        → Cohere    push-to-talk (DEFAULT — #1 Open ASR, multilingual incl. FR)
# SUPER+ALT+T    → Parakeet  streaming toggle (live incremental text, English)
# SUPER+CTRL+T   → Parakeet  push-to-talk (fast English-only alternative)
# SUPER+ALT+M    → Meeting   mode toggle (continuous transcription + Ollama summary)
#
# Engine on SUPER+T is omitted on purpose → uses config default (engine = "cohere").
#
# NOTE: recording start switches to the `voxtype_recording` submap (see
# ../../conf.d/voxtype-submap.conf) to neutralise modifier interference. The
# streaming toggle therefore has a matching stop binding inside that submap.
# ============================================================================

# Cohere — default engine, push-to-talk (multilingual, daily driver)
bindd  = SUPER, T, Start voice dictation (Cohere), exec, voxtype record start
binddr = SUPER, T, Stop voice dictation (Cohere), exec, voxtype record stop

# Parakeet — streaming dictation, toggle (live incremental text, English)
bindd  = SUPER ALT, T, Toggle streaming dictation (Parakeet), exec, voxtype record toggle

# Parakeet — fast English-only push-to-talk
bindd  = SUPER CTRL, T, Start voice dictation (Parakeet), exec, voxtype record start --model parakeet-tdt-0.6b-v3
binddr = SUPER CTRL, T, Stop voice dictation (Parakeet), exec, voxtype record stop

# Meeting mode — continuous transcription with speaker diarization + AI summary
bindd  = SUPER ALT, M, Toggle meeting transcription, exec, voice-meeting toggle
