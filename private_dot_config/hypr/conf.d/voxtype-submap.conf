# Voxtype compositor integration
# Fixes modifier key interference when using compositor keybindings
# Generated by: voxtype setup compositor hyprland
#
# One submap is used:
# - voxtype_recording: Active during recording/transcription. F12 cancels.
# voxtype_suppress is omitted: only needed for mode = "type" (wtype), not clipboard.

# Recording submap - active during recording and transcription
# F12 cancels recording/transcription and returns to normal
# binddr entries mirror voice.conf — required because pre_recording_command
# switches to this submap BEFORE the key is released, so the default submap's
# binddr for SUPER+T never fires. voxtype handles submap reset via post_output_command.
submap = voxtype_recording
bind   = , F12, exec, voxtype record cancel
bind   = , F12, submap, reset
bindr = SUPER,       T, exec, voxtype record stop
bindr = SUPER CTRL,  T, exec, voxtype record stop
# Streaming is toggle-based (press to start, press to stop). The start binding lives
# in the default submap; this entry lets the same combo stop it from inside the submap.
bind  = SUPER ALT,   T, exec, voxtype record toggle
submap = reset

# voxtype_suppress intentionally omitted: only needed for mode = "type" (wtype).
# clipboard mode writes via wl-copy — modifier keys cannot interfere.
